<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Acceso Alumno
    </title>

    <!-- GOOGLE FONTS -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- ICONOS -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{

            height:100vh;

            background:#f1f5f9;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

        }

        /* FONDO */

        .background{

            position:absolute;

            width:100%;

            height:100%;

            background:

            radial-gradient(circle at top left,#2563eb15,transparent 30%),
            radial-gradient(circle at bottom right,#0f172a15,transparent 30%);

            z-index:0;

        }

        /* CARD */

        .container{

            position:relative;

            z-index:1;

            width:950px;

            height:560px;

            background:white;

            border-radius:30px;

            overflow:hidden;

            display:flex;

            box-shadow:0 10px 40px rgba(0,0,0,.08);

        }

        /* LEFT */

        .left{

            width:45%;

            background:linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;

            padding:60px;

            display:flex;

            flex-direction:column;

            justify-content:center;

        }

        .icon{

            width:90px;

            height:90px;

            border-radius:25px;

            background:rgba(255,255,255,.15);

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:35px;

            margin-bottom:30px;

            backdrop-filter:blur(10px);

        }

        .left h1{

            font-size:40px;

            line-height:1.2;

            margin-bottom:20px;

        }

        .left p{

            color:#dbeafe;

            line-height:1.8;

            font-size:15px;

        }

        /* RIGHT */

        .right{

            width:55%;

            padding:60px;

            display:flex;

            flex-direction:column;

            justify-content:center;

        }

        .right h2{

            font-size:32px;

            color:#0f172a;

            margin-bottom:10px;

        }

        .right p{

            color:#64748b;

            margin-bottom:40px;

        }

        /* INPUTS */

        .input-group{

            position:relative;

            margin-bottom:25px;

        }

        .input-group i{

            position:absolute;

            top:18px;

            left:18px;

            color:#64748b;

            font-size:16px;

        }

        input{

            width:100%;

            padding:18px 18px 18px 50px;

            border:none;

            background:#f8fafc;

            border-radius:15px;

            outline:none;

            border:1px solid #e2e8f0;

            transition:.3s;

            font-size:15px;

        }

        input:focus{

            border-color:#2563eb;

            background:white;

            box-shadow:0 0 0 4px rgba(37,99,235,.1);

        }

        /* BOTON */

        button{

            width:100%;

            padding:18px;

            border:none;

            border-radius:15px;

            background:#2563eb;

            color:white;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            background:#1d4ed8;

            transform:translateY(-2px);

        }

        /* FOOTER */

        .footer{

            margin-top:30px;

            text-align:center;

            color:#64748b;

            font-size:14px;

        }

        .footer a{

            color:#2563eb;

            text-decoration:none;

            font-weight:600;

        }

    </style>

</head>

<body>

    <div class="background"></div>

    <div class="container">

        <!-- LEFT -->

        <div class="left">

            <div class="icon">

                <i class="fa-solid fa-user-graduate"></i>

            </div>

            <h1>

                Acceso Académico Alumno

            </h1>

            <p>

                Ingresa con tu matrícula institucional para acceder
                a tus exámenes, entregas y recursos académicos.

            </p>

        </div>

        <!-- RIGHT -->

        <div class="right">

            <h2>

                Iniciar sesión

            </h2>

            <p>

                Introduce tu matrícula para continuar.

            </p>

            <form
                action="/entrar_alumno"
                method="POST"
            >

                <div class="input-group">

                    <i class="fa-solid fa-id-card"></i>

                    <input
                        type="text"
                        name="matricula"
                        placeholder="Matrícula institucional"
                        required
                    >

                </div>

                <button type="submit">

                    Entrar al sistema

                </button>

            </form>

            <div class="footer">

                ¿Deseas volver?
                <a href="/">

                    Regresar al inicio

                </a>

            </div>

        </div>

    </div>

</body>
</html>
