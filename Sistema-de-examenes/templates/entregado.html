<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>
        Examen entregado
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            background:#0f172a;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .card{

            width:500px;

            background:white;

            padding:50px;

            border-radius:20px;

            text-align:center;

            box-shadow:0 0 30px rgba(0,0,0,.3);

        }

        h1{

            color:#16a34a;

            margin-bottom:20px;

        }

        p{

            color:gray;

            margin-bottom:30px;

        }

        a{

            background:#2563eb;

            color:white;

            padding:15px 25px;

            border-radius:10px;

            text-decoration:none;

        }

    </style>

</head>

<body>

    <div class="card">

        <h1>
            ✅ Examen entregado
        </h1>

        <p>
            Tu examen fue enviado correctamente.
        </p>

        <a href="/alumno">
            Volver al panel
        </a>

    </div>

</body>
</html>
